name: Deploy Ollama (bge-small) to EC2

on:
  push:
    branches:
      - qa
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - qa

env:
  TARGET_ENV: ${{ github.event.inputs.environment || 'qa' }}

jobs:
  ensure-instance:
    runs-on: ubuntu-latest
    outputs:
      instance_id: ${{ steps.ensure.outputs.instance_id }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Ensure EC2 instance exists
        id: ensure
        env:
          AWS_AMI_ID: ${{ vars.AWS_AMI_ID || 'ami-0071c8c431eea0edb' }}
          AWS_SECURITY_GROUP_ID: ${{ vars.AWS_SECURITY_GROUP_ID }}
          EC2_KEY_PAIR: ${{ vars.EC2_KEY_PAIR || 'ec2' }}
          EC2_IAM_INSTANCE_PROFILE: ${{ vars.EC2_IAM_INSTANCE_PROFILE || 'ec2-ssm-role' }}
        run: |
          set -e
          if [ -z "$AWS_SECURITY_GROUP_ID" ]; then
            echo "Resolving security group by name 'ec2'..."
            AWS_SECURITY_GROUP_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=ec2" --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || true)
            if [ -z "$AWS_SECURITY_GROUP_ID" ] || [ "$AWS_SECURITY_GROUP_ID" = "None" ]; then
              AWS_SECURITY_GROUP_ID="sg-01dad3e1686a3d49f"
              echo "Using default security group $AWS_SECURITY_GROUP_ID"
            fi
          fi

          INSTANCE_NAME="ec2-cpu-ollama"

          echo "Looking for running instance with tag Name=$INSTANCE_NAME..."
          EXISTING_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$INSTANCE_NAME" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text 2>/dev/null)

          if [ -n "$EXISTING_ID" ] && [ "$EXISTING_ID" != "None" ]; then
            echo "Found existing instance: $EXISTING_ID"
            echo "instance_id=$EXISTING_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No running instance found. Creating new instance..."
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id "$AWS_AMI_ID" \
            --instance-type t4g.micro \
            --key-name "$EC2_KEY_PAIR" \
            --security-group-ids "$AWS_SECURITY_GROUP_ID" \
            --iam-instance-profile Name="$EC2_IAM_INSTANCE_PROFILE" \
            --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=$INSTANCE_NAME}]" \
            --block-device-mappings 'DeviceName=/dev/sda1,Ebs={VolumeSize=20,VolumeType=gp3}' \
            --query 'Instances[0].InstanceId' \
            --output text)

          echo "Created instance $INSTANCE_ID. Waiting for it to be running..."
          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"

          echo "Waiting for SSM agent to register..."
          for i in $(seq 1 36); do
            if aws ssm describe-instance-information --filters "Key=InstanceIds,Values=$INSTANCE_ID" --query 'InstanceInformationList[0].InstanceId' --output text 2>/dev/null | grep -q "i-"; then
              echo "Instance registered with SSM"
              echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            [ $i -eq 36 ] && { echo "Timeout waiting for SSM registration"; exit 1; }
            sleep 5
          done

  deploy:
    needs: ensure-instance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Upload deploy script to S3
        run: |
          aws s3 cp scripts/deploy.sh "s3://${{ vars.DEPLOY_BUCKET }}/ec2-cpu-ollama/deploy.sh" --content-type "text/x-shellscript"

      - name: Run deploy via SSM
        run: |
          INSTANCE_ID="${{ needs.ensure-instance.outputs.instance_id }}"
          BUCKET="${{ vars.DEPLOY_BUCKET }}"
          REGION="${{ vars.AWS_REGION || 'us-east-1' }}"
          S3_URL="https://${BUCKET}.s3.${REGION}.amazonaws.com/ec2-cpu-ollama/deploy.sh"

          echo '{"sourceType":["S3"],"sourceInfo":["{\"path\":\"'"$S3_URL"'\"}"]}' > ssm-params.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunRemoteScript" \
            --parameters file://ssm-params.json \
            --timeout-seconds 600 \
            --output text \
            --query 'Command.CommandId')

          echo "Waiting for SSM command $COMMAND_ID to complete..."
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'Status' \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "Deploy failed with status: $STATUS"
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID"
            exit 1
          fi
          echo "Deploy completed successfully"
